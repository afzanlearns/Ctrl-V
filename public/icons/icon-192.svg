<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#0EA5E9"/>
  <!-- Clipboard body -->
  <rect x="52" y="38" width="88" height="114" rx="14" fill="white"/>
  <!-- Clipboard inner -->
  <rect x="60" y="54" width="72" height="90" rx="6" fill="#F0F9FF"/>
  <!-- Clip -->
  <rect x="80" y="30" width="32" height="20" rx="6" fill="white"/>
  <rect x="74" y="46" width="44" height="8" rx="4" fill="#E0F2FE"/>
  <!-- Pen body -->
  <rect x="100" y="86" width="10" height="72" rx="4" fill="#F59E0B" transform="rotate(25 105 122)"/>
