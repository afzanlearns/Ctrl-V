  <polygon points="110,148 106,164 102,148" fill="#F59E0B" transform="rotate(25 106 156)"/>
  <!-- Pen tip -->
  <circle cx="106" cy="164" r="3" fill="#1E293B" transform="rotate(25 106 164)"/>
  <!-- Lines on clipboard -->
  <rect x="68" y="66" width="56" height="4" rx="2" fill="#BAE6FD"/>
  <rect x="68" y="78" width="44" height="4" rx="2" fill="#BAE6FD"/>
  <rect x="68" y="90" width="52" height="4" rx="2" fill="#BAE6FD"/>
  <rect x="68" y="102" width="36" height="4" rx="2" fill="#BAE6FD"/>
  <rect x="68" y="114" width="48" height="4" rx="2" fill="#BAE6FD"/>
</svg>
